title: "Tejal's Blog"
description: "Building in public — dev projects, vibe coding, and things I'm learning along the way."
author:
  name: "Tejal Goyal"

baseurl: ""
url: "https://tejalgoyal2.github.io"

permalink: /posts/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - WRITING-GUIDE.md
  - _templates
