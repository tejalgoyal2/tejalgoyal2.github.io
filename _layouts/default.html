<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">Tejal's Blog<span class="dot"></span></a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Posts</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="https://github.com/tejalgoyal2" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Built by Tejal Goyal &middot; Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a> &middot; <a href="{{ '/feed.xml' | relative_url }}">RSS</a></p>
  </footer>

</body>
</html>
